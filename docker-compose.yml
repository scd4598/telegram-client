version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telegram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telegram_secret}
      POSTGRES_DB: ${POSTGRES_DB:-telegram_client}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-telegram}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-telegram}:${POSTGRES_PASSWORD:-telegram_secret}@postgres:5432/${POSTGRES_DB:-telegram_client}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  pgdata:
